# ---------------------------------------------------------------------------
# Multisensor Modbus Simulator — esempio multi-server.
#
# Schema:
#   modbus:           configurazione del client Modbus usato dal CLI legacy
#                     (python main.py). Non influisce sul web UI / embedded.
#   tick_seconds:     cadenza globale del simulatore.
#   log_level:        DEBUG | INFO | WARNING | ERROR
#   servers:          lista di server Modbus TCP indipendenti.
#                     - ogni server ha (host, port) unico
#                     - dentro ogni server, sensori con unit_id diversi
#                       sono esposti come slave indipendenti (gateway-style)
#                     - sensor id può ripetersi tra server diversi
#
# Schema legacy (`server: {...}` + `sensors: [...]` flat) ancora supportato:
# viene migrato automaticamente al primo load in un singolo server "default".
# ---------------------------------------------------------------------------

modbus:
  host: 127.0.0.1
  port: 5020
  unit_id: 1
  connect_timeout_ms: 3000
  write_timeout_ms: 1000
  max_retry_attempts: 3
  backoff_seconds: [1.0, 2.0, 5.0]

tick_seconds: 1.0
log_level: INFO

servers:
  # -------------------------------------------------------------------------
  # Server 1: simula un piano "office" con due slave dietro un gateway.
  #   - slave 1 = unità ambiente (temperatura + umidità)
  #   - slave 2 = unità qualità aria (CO2 + TVOC + PM)
  # -------------------------------------------------------------------------
  - id: plant_a
    label: Plant A — uffici
    description: Gateway ambientale piano uffici
    host: 0.0.0.0
    port: 5020
    default_unit_id: 1
    register_count_min: 16
    auto_start: false
    sensors:
      - id: env_room
        unit_id: 1
        base_address: 0
        byte_order: big
        word_order: big
        write_rate_seconds: 1.0
        measurements:
          - name: temperature
            offset: 0
            register_type: holding_register
            data_type: int16
            scale: 10.0
            min_value: -40.0
            max_value: 80.0
            update_rate: 1.0
            unit: °C
          - name: humidity
            offset: 1
            register_type: holding_register
            data_type: uint16
            scale: 10.0
            min_value: 0.0
            max_value: 100.0
            update_rate: 1.0
            unit: "%"
      - id: air_quality
        unit_id: 2
        base_address: 0
        byte_order: big
        word_order: big
        write_rate_seconds: 5.0
        measurements:
          - name: co2
            offset: 0
            data_type: uint16
            scale: 1.0
            min_value: 400.0
            max_value: 5000.0
            update_rate: 5.0
            unit: ppm
          - name: tvoc
            offset: 1
            data_type: uint16
            scale: 1.0
            min_value: 0.0
            max_value: 5000.0
            update_rate: 5.0
            unit: ppb
          - name: pm25
            offset: 2
            data_type: uint16
            scale: 1.0
            min_value: 0.0
            max_value: 500.0
            update_rate: 10.0
            unit: µg/m³

  # -------------------------------------------------------------------------
  # Server 2: simula un quadro elettrico in un magazzino su porta diversa.
  # Sensor id liberi di ripetersi tra server (es. "power_meter") senza conflitto.
  # -------------------------------------------------------------------------
  - id: plant_b
    label: Plant B — magazzino
    host: 0.0.0.0
    port: 5021
    default_unit_id: 1
    auto_start: false
    sensors:
      - id: power_meter
        unit_id: 1
        base_address: 100
        byte_order: big
        word_order: big
        write_rate_seconds: 1.0
        measurements:
          - name: voltage
            offset: 0
            data_type: float32
            scale: 1.0
            min_value: 200.0
            max_value: 250.0
            update_rate: 1.0
            unit: V
          - name: current
            offset: 2
            data_type: float32
            scale: 1.0
            min_value: 0.0
            max_value: 100.0
            update_rate: 1.0
            unit: A
          - name: power
            offset: 4
            data_type: float32
            scale: 1.0
            min_value: 0.0
            max_value: 50000.0
            update_rate: 1.0
            unit: W
