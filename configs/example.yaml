# ============================================================================
# Sensor Simulator - Example Configuration
# ============================================================================
#
# Data types supported:
#   uint16   - 1 register  (0 to 65535)
#   int16    - 1 register  (-32768 to 32767)
#   uint32   - 2 registers (0 to 4294967295)
#   int32    - 2 registers (-2147483648 to 2147483647)
#   float32  - 2 registers (IEEE 754 single precision)
#   float64  - 4 registers (IEEE 754 double precision)
#
# Endianness (per sensor):
#   byte_order: "big" or "little"   (byte order within each 16-bit register)
#   word_order: "big" or "little"   (register order for multi-register types)
#
#   big/big     = AB CD  (standard Modbus / Big Endian)
#   big/little  = CD AB  (word-swapped)
#   little/big  = BA DC  (byte-swapped)
#   little/little = DC BA (Little Endian)
#
# Measurement fields:
#   name        - Identifier (known names get realistic patterns, others use generic)
#   offset      - Register offset from sensor base_address
#   data_type   - One of the types above
#   scale       - Multiplier before encoding (e.g., 10 = 1 decimal place for int types)
#   min_value   - Minimum raw value (before scaling)
#   max_value   - Maximum raw value (before scaling)
#   update_rate - Update interval in seconds
#
# Known measurement names with realistic generation patterns:
#   temperature, humidity, co2, tvoc, pm25, pm10, lux, noise
# ============================================================================

# -- Modbus TCP connection --
modbus:
  host: "127.0.0.1"
  port: 502
  unit_id: 1
  connect_timeout_ms: 3000
  write_timeout_ms: 1000
  max_retry_attempts: 3
  backoff_seconds: [1.0, 2.0, 5.0]

# -- Main loop --
tick_seconds: 1.0

# -- Logging --
log_level: "INFO"

# -- Sensors --
sensors:

  # ----------------------------------------------------------------
  # Sensor 1: Indoor air quality (uint16 encoding, standard Modbus)
  # ----------------------------------------------------------------
  - id: "indoor_aq"
    base_address: 0
    byte_order: "big"
    word_order: "big"
    measurements:
      - name: "temperature"
        offset: 0
        data_type: "int16"
        scale: 10                # 25.3°C -> 253
        min_value: -40.0
        max_value: 80.0
        update_rate: 1.0

      - name: "humidity"
        offset: 1
        data_type: "uint16"
        scale: 10                # 55.2% -> 552
        min_value: 0.0
        max_value: 100.0
        update_rate: 1.0

      - name: "co2"
        offset: 2
        data_type: "uint16"
        scale: 1
        min_value: 400.0
        max_value: 5000.0
        update_rate: 5.0

      - name: "tvoc"
        offset: 3
        data_type: "uint16"
        scale: 1
        min_value: 0.0
        max_value: 5000.0
        update_rate: 5.0

      - name: "pm25"
        offset: 4
        data_type: "uint16"
        scale: 1
        min_value: 0.0
        max_value: 500.0
        update_rate: 10.0

      - name: "pm10"
        offset: 5
        data_type: "uint16"
        scale: 1
        min_value: 0.0
        max_value: 500.0
        update_rate: 10.0

      - name: "lux"
        offset: 6
        data_type: "uint16"
        scale: 1
        min_value: 0.0
        max_value: 65535.0
        update_rate: 1.0

      - name: "noise"
        offset: 7
        data_type: "uint16"
        scale: 10
        min_value: 0.0
        max_value: 130.0
        update_rate: 1.0

  # ----------------------------------------------------------------
  # Sensor 2: High-precision weather station (float32 encoding)
  # Uses 2 registers per measurement -> offsets increment by 2
  # ----------------------------------------------------------------
  - id: "weather_station"
    base_address: 100
    byte_order: "big"
    word_order: "big"
    measurements:
      - name: "temperature"
        offset: 0
        data_type: "float32"     # Stores 25.3 as IEEE 754 float
        scale: 1.0
        min_value: -40.0
        max_value: 80.0
        update_rate: 1.0

      - name: "humidity"
        offset: 2               # float32 = 2 registers, so next offset is +2
        data_type: "float32"
        scale: 1.0
        min_value: 0.0
        max_value: 100.0
        update_rate: 1.0

      - name: "lux"
        offset: 4
        data_type: "float32"
        scale: 1.0
        min_value: 0.0
        max_value: 100000.0
        update_rate: 2.0

