modbus:
  host: 127.0.0.1
  port: 502
  unit_id: 1
  connect_timeout_ms: 3000
  write_timeout_ms: 1000
  max_retry_attempts: 3
  backoff_seconds:
  - 1.0
  - 2.0
  - 5.0
server:
  enabled: true
  host: 0.0.0.0
  port: 502
  default_unit_id: 1
  register_count_min: 16
sensors:
- id: office
  unit_id: 1
  base_address: 0
  byte_order: big
  word_order: big
  write_rate_seconds: 1.0
  measurements:
  - name: temperature
    offset: 0
    data_type: int16
    scale: 10.0
    min_value: -40.0
    max_value: 80.0
    update_rate: 1.0
    unit: °C
    fault:
      error_rate: 0.0
      error_code: 2
      frozen: false
      drop_writes: false
  - name: humidity
    offset: 1
    data_type: uint16
    scale: 10.0
    min_value: 0.0
    max_value: 100.0
    update_rate: 1.0
    unit: '%'
    fault:
      error_rate: 0.0
      error_code: 2
      frozen: false
      drop_writes: false
  fault:
    latency_ms: 0
    offline: false
    error_rate: 0.0
    error_code: 11
- id: warehouse
  unit_id: 2
  base_address: 0
  byte_order: big
  word_order: big
  write_rate_seconds: 2.0
  measurements:
  - name: temperature
    offset: 0
    data_type: int16
    scale: 10.0
    min_value: -40.0
    max_value: 80.0
    update_rate: 1.0
    unit: °C
    fault:
      error_rate: 0.0
      error_code: 2
      frozen: false
      drop_writes: false
  - name: co2
    offset: 2
    data_type: uint16
    scale: 1.0
    min_value: 400.0
    max_value: 5000.0
    update_rate: 5.0
    unit: ppm
    fault:
      error_rate: 0.0
      error_code: 2
      frozen: false
      drop_writes: false
  fault:
    latency_ms: 0
    offline: false
    error_rate: 0.0
    error_code: 11
tick_seconds: 1.0
log_level: INFO
