modbus:
  host: 127.0.0.1
  port: 5020
  unit_id: 1
  connect_timeout_ms: 3000
  write_timeout_ms: 1000
  max_retry_attempts: 3
  backoff_seconds:
  - 1.0
  - 2.0
  - 5.0
servers:
- id: alpha
  label: x
  description: null
  host: 0.0.0.0
  port: 18900
  default_unit_id: 1
  register_count_min: 16
  auto_start: false
  sensors:
  - id: env
    unit_id: 1
    base_address: 0
    byte_order: big
    word_order: big
    write_rate_seconds: 0.5
    measurements:
    - name: temp
      offset: 0
      register_type: holding_register
      data_type: int16
      scale: 50.0
      min_value: -40.0
      max_value: 80.0
      update_rate: 0.5
      unit: °C
      fault:
        error_rate: 0.0
        error_code: 2
        frozen: false
        drop_writes: false
        bit_flip_rate: 0.0
        drift_per_second: 0.0
    - name: flag
      offset: 5
      register_type: holding_register
      data_type: uint16
      scale: 1.0
      min_value: 0.0
      max_value: 1.0
      update_rate: 0.5
      unit: null
      fault:
        error_rate: 0.0
        error_code: 2
        frozen: false
        drop_writes: false
        bit_flip_rate: 0.0
        drift_per_second: 0.0
    - name: motor
      offset: 10
      register_type: coil
      data_type: bool
      scale: 1.0
      min_value: 0.0
      max_value: 1.0
      update_rate: 0.5
      unit: null
      fault:
        error_rate: 0.0
        error_code: 2
        frozen: false
        drop_writes: false
        bit_flip_rate: 0.0
        drift_per_second: 0.0
    fault:
      latency_ms: 0
      offline: false
      error_rate: 0.0
      error_code: 11
tick_seconds: 0.5
log_level: INFO
